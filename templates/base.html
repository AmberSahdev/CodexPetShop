<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Codex Pet Shop - Cute Pets for Codex{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{% endblock %}" />
  <link rel="canonical" href="{% block canonical_url %}{{ canonical_request_url() }}{% endblock %}" />

  {# Open Graph / Twitter share preview #}
  <meta property="og:type" content="{% block og_type %}website{% endblock %}" />
  <meta property="og:site_name" content="Codex Pet Shop" />
  <meta property="og:title" content="{% block og_title %}{{ self.title() }}{% endblock %}" />
  <meta property="og:description" content="{{ self.meta_description() }}" />
  <meta property="og:url" content="{% block og_url %}{{ canonical_request_url() }}{% endblock %}" />
  <meta property="og:image" content="{% block og_image %}{{ url_for('static', filename='preview.png', _external=True) }}{% endblock %}" />
  <meta property="og:image:secure_url" content="{% block og_image_secure %}{{ self.og_image() }}{% endblock %}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="{% block og_image_alt %}Codex Pet Shop preview{% endblock %}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@AmberSahdev" />
  <meta name="twitter:title" content="{{ self.og_title() }}" />
  <meta name="twitter:description" content="{{ self.meta_description() }}" />
  <meta name="twitter:image" content="{{ self.og_image() }}" />
  <meta name="twitter:image:alt" content="{{ self.og_image_alt() }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script>
    // Solarized Light palette.
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base3:  "#fdf6e3", // page background
            base2:  "#eee8d5", // panels / soft fills
            base1:  "#93a1a1", // muted / hairline
            base0:  "#839496",
            base00: "#657b83",
            base01: "#586e75", // body text
            base02: "#073642", // headings
            base03: "#002b36",
            sol: {
              yellow:  "#b58900",
              illini:  "#ff5f05",
              orange:  "#cb4b16",
              red:     "#dc322f",
              magenta: "#d33682",
              violet:  "#6c71c4",
              blue:    "#268bd2",
              cyan:    "#2aa198",
              green:   "#859900",
            },
          },
          fontFamily: {
            sans: ['Newsreader', 'ui-serif', 'Georgia', 'serif'],
          },
          borderRadius: {
            xl2: "1rem",
          },
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    @layer base {
      html, body { background-color: theme('colors.base3'); color: theme('colors.base01'); font-variation-settings: "opsz" 16; }
      h1, h2, h3 { color: theme('colors.base02'); letter-spacing: -0.015em; font-variation-settings: "opsz" 60; }
      code, pre { font-family: 'Newsreader', ui-serif, Georgia, serif; font-style: italic; }
      a { color: inherit; }
      ::selection { background: theme('colors.base2'); }
      .icon { display: inline-block; width: 1em; height: 1em; vertical-align: -0.15em; flex-shrink: 0; }
      .icon-mask { display: inline-block; width: 1em; height: 1em; vertical-align: -0.15em; flex-shrink: 0; background-color: currentColor; -webkit-mask-position: center; mask-position: center; -webkit-mask-size: contain; mask-size: contain; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; }
      .icon-check { -webkit-mask-image: url('/static/icons/check.svg'); mask-image: url('/static/icons/check.svg'); }
    }
    @layer components {
      .btn       { @apply inline-flex items-center justify-center gap-2 rounded-full px-5 py-2.5 text-sm font-medium transition active:scale-[.99]; }
      .btn-primary { @apply btn bg-base02 text-base3 hover:bg-base01; }
      .btn-ghost   { @apply btn ring-1 ring-base1/40 text-base01 hover:bg-base2; }
      .btn-link    { @apply inline-flex items-center gap-1 text-sol-blue hover:underline underline-offset-4; }
      .panel     { @apply rounded-2xl bg-base3 ring-1 ring-base1/30; }
      .card      { @apply relative aspect-square rounded-2xl bg-base3 ring-1 ring-base1/30 transition hover:ring-base1/60 hover:-translate-y-0.5 overflow-hidden; }
      .field     { @apply w-full rounded-xl border-base1/40 bg-base3 text-base01 placeholder:text-base1 focus:border-base01 focus:ring-base01; }
      .hairline  { @apply border-t border-base1/30; }
      .kbd       { @apply inline-flex items-center px-1.5 py-0.5 rounded-md text-[11px] ring-1 ring-base1/40 bg-base2 text-base00; }
      .chip      { @apply inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[11px] ring-1 ring-base1/40 bg-base2 text-base00; }
    }
  </style>

</head>
<body class="min-h-screen font-sans antialiased">
  <header class="sticky top-8 z-50 mx-auto max-w-5xl px-4 mt-6">
    <div class="group/header flex items-center justify-between rounded-2xl bg-white/65 backdrop-blur-lg backdrop-saturate-150 ring-1 ring-white/80 shadow-[0_1px_0_rgba(255,255,255,0.7)_inset,0_18px_40px_-16px_rgba(7,54,66,0.22)] px-5 py-3 transition duration-200 ease-out hover:bg-white/75 hover:-translate-y-[1px] hover:shadow-[0_1px_0_rgba(255,255,255,0.8)_inset,0_22px_44px_-14px_rgba(7,54,66,0.28)]">
      <a href="/" class="flex items-center gap-2 text-base02">
        {{ icon('pets', 'icon text-sol-illini text-3xl') }}
        <span class="font-semibold tracking-tight text-xl">Codex Pet Shop</span>
      </a>
      <nav class="flex items-center gap-6 text-sm text-base00">
        <a href="/#faq" class="hover:text-base02 transition">FAQ</a>
        <a href="/all" class="hover:text-base02 transition">All</a>
        <a href="/upload" class="hover:text-base02 transition">Post</a>
      </nav>
    </div>
  </header>
  <main class="pt-10">{% block content %}{% endblock %}</main>
  <div class="mx-auto max-w-5xl px-4 mt-8">
    <img src="{{ url_for('static', filename='colorbar.png') }}"
         alt=""
         class="h-2 w-full object-cover"
         aria-hidden="true" />
  </div>
  
  <footer class="mx-auto max-w-5xl px-4 pt-4 pb-8 text-[13px] text-base1">
    <div class="flex items-center justify-between gap-4">
      <span class="min-w-0">
        Made with
        {{ icon('favorite', 'icon text-[15px] text-sol-red mx-0.5') }}
        by <a href="https://ambersah.dev" target="_blank" rel="noopener" class="text-base00 underline underline-offset-4 hover:text-sol-red">AmberSah.dev</a>'s Codex Credits
      </span>
      <span class="inline-flex items-center self-center">
        <span class="mx-1.5 text-base1/80">·</span>
        <a href="https://x.com/AmberSahdev" target="_blank" rel="noopener" class="relative -top-px inline-flex items-center justify-center rounded-full p-1 text-[#1d9bf0] transition hover:bg-base2 hover:text-[#1583cc]" aria-label="AmberSahdev on X">
          <svg viewBox="0 0 24 24" aria-hidden="true" class="h-4 w-4 fill-current">
            <path d="M23 4.57a9.5 9.5 0 0 1-2.74.75 4.78 4.78 0 0 0 2.1-2.64 9.56 9.56 0 0 1-3.03 1.16 4.77 4.77 0 0 0-8.12 4.35A13.53 13.53 0 0 1 1.39 3.15a4.77 4.77 0 0 0 1.48 6.37 4.74 4.74 0 0 1-2.16-.6v.06a4.77 4.77 0 0 0 3.82 4.67 4.8 4.8 0 0 1-2.15.08 4.78 4.78 0 0 0 4.46 3.31A9.57 9.57 0 0 1 1 19.54a13.5 13.5 0 0 0 7.29 2.14c8.75 0 13.53-7.25 13.53-13.53 0-.21 0-.41-.01-.62A9.67 9.67 0 0 0 23 4.57z"/>
          </svg>
        </a>
      </span>
    </div>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
